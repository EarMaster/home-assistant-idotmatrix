name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_WITHOUT_V="${VERSION#v}"
          # Extract the block between this version's header and the next one
          awk "/^## \[${VERSION_WITHOUT_V}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create release directory
        run: mkdir -p release/custom_components

      - name: Copy integration files
        run: cp -r custom_components/idotmatrix release/custom_components/

      - name: Remove unwanted files
        run: |
          find release/ -name "__pycache__" -type d -exec rm -rf {} + || true
          find release/ -name "*.pyc" -delete || true
          find release/ -name ".DS_Store" -delete || true

      - name: Create zip file
        run: |
          cd release
          zip -r ../idotmatrix-${{ steps.get_version.outputs.version }}.zip custom_components/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.get_version.outputs.version }} \
            --title "iDotMatrix Display" \
            --notes-file release_notes.md \
            idotmatrix-${{ steps.get_version.outputs.version }}.zip
